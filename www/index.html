<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>往事书架 - 专业工程版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-100 min-h-screen text-stone-800">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[70] flex flex-col items-center justify-center">
        <div class="text-4xl animate-bounce mb-4">🖨️</div>
        <p class="text-stone-600 font-bold tracking-widest">正在生成精美 PDF，请稍候...</p>
    </div>

    <div id="app" class="max-w-2xl mx-auto h-screen relative shadow-2xl bg-white overflow-hidden overflow-y-auto"></div>

    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 transition-opacity no-print" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 left-0 w-72 h-full bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 no-print flex flex-col">
        <div class="h-40 bg-stone-50 flex items-center justify-center border-b border-stone-100 overflow-hidden relative">
            <div class="absolute w-32 h-32 bg-cyan-50 rounded-full blur-2xl -top-10 -right-10"></div>
            <div id="drawerHeaderIcon" class="text-6xl animate-float relative z-10 drop-shadow-md">🎈</div>
        </div>
        <div class="flex-1 overflow-y-auto py-4 px-6 space-y-6 text-stone-600 font-medium">
            <h3 class="text-xs text-stone-400 mb-2">账号信息</h3>
            <div class="flex items-center justify-between cursor-pointer hover:text-cyan-600 transition-colors">
                <div class="flex items-center gap-4"><span class="text-xl text-stone-400">⭕</span> 统计</div>
                <span class="text-xs text-stone-400 font-normal tracking-wider">记录 <span id="statDays" class="font-bold text-stone-600">0</span> 天</span>
            </div>
            <div id="btnGallery" onclick="alert('图库模块还未接入，请稍后补全 gallery.js')" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors">
                <span class="text-xl text-stone-400">📷</span> 图库
            </div>
            <div id="btnRoam" onclick="alert('漫游模块还未接入，请稍后补全 roam.js')" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors">
                <span class="text-xl text-stone-400">🧭</span> 漫游
            </div>
            <div onclick="goToMap()" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors">
                <span class="text-xl text-stone-400">🗺️</span> 地图
            </div>
            <div onclick="goToCalendar()" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors">
            <span class="text-xl text-stone-400">📅</span> 日历
             </div>

             <div onclick="goToRepliedList()" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors">
            <span class="text-xl text-stone-400">📮</span> 信箱
             </div>

            <div onclick="goToSettings()" class="flex items-center gap-4 cursor-pointer hover:text-cyan-600 transition-colors mt-8 pt-6 border-t border-stone-100">
                <span class="text-xl text-stone-400">⚙️</span> 设置
            </div>
        </div>


        </div>
    </div>

    <div id="weatherModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 transition-opacity no-print">
        <div class="bg-white w-full max-w-sm rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl transform transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-stone-700">当时的天气是？</h3>
                <button onclick="closeWeatherModal()" class="text-stone-400 font-bold hover:text-stone-600 text-xl">✕</button>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="selectWeather('☀️ 晴天')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">☀️</span><span class="text-xs text-stone-500">晴天</span></button>
                <button onclick="selectWeather('⛅ 多云')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">⛅</span><span class="text-xs text-stone-500">多云</span></button>
                <button onclick="selectWeather('☁️ 阴天')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">☁️</span><span class="text-xs text-stone-500">阴天</span></button>
                <button onclick="selectWeather('🌧️ 雨天')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">🌧️</span><span class="text-xs text-stone-500">雨天</span></button>
                <button onclick="selectWeather('❄️ 雪天')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">❄️</span><span class="text-xs text-stone-500">雪天</span></button>
                <button onclick="selectWeather('💨 大风')" class="flex flex-col items-center gap-1 p-3 border border-stone-200 rounded-xl hover:bg-cyan-50 transition-colors"><span class="text-2xl">💨</span><span class="text-xs text-stone-500">大风</span></button>
            </div>
            <button onclick="selectWeather('')" class="w-full mt-6 py-3 bg-stone-100 text-stone-500 rounded-xl font-bold hover:bg-stone-200 transition-colors text-sm">清除天气 / 无</button>
        </div>
    </div>

<!-- ================= 1. 定位选择弹窗 ================= -->
    <div id="locationModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 transition-opacity no-print">
        <div class="bg-white w-full max-w-sm rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl transform transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 id="locationModalTitle" class="text-lg font-bold text-stone-700">选择定位方式</h3>
                <button onclick="closeLocationModal()" class="text-stone-400 font-bold hover:text-stone-600 text-xl">✕</button>
            </div>
            
            <div class="space-y-4">
                <button onclick="getLocationFromDevice()" class="w-full flex items-center gap-4 p-4 border border-stone-200 rounded-2xl hover:bg-cyan-50 transition-colors group">
                    <div class="w-10 h-10 rounded-full bg-cyan-100 flex items-center justify-center text-xl group-hover:bg-cyan-200 transition-colors">📍</div>
                    <div class="flex flex-col items-start">
                        <span id="geoBtnText" class="text-sm font-bold text-stone-700">获取当前位置</span>
                        <span class="text-[10px] text-stone-400">调用手机/电脑原生 GPS</span>
                    </div>
                </button>
                <button onclick="openMapPicker()" class="w-full flex items-center gap-4 p-4 border border-stone-200 rounded-2xl hover:bg-emerald-50 transition-colors group">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-xl group-hover:bg-emerald-200 transition-colors">🗺️</div>
                    <div class="flex flex-col items-start">
                        <span class="text-sm font-bold text-stone-700">在地图中寻找</span>
                        <span class="text-[10px] text-stone-400">打开大地图手动选择定位</span>
                    </div>
                </button>
                
                <!-- 手动输入地名 -->
                <div class="flex items-center gap-2 p-1.5 border border-stone-200 rounded-2xl focus-within:border-cyan-500 focus-within:ring-1 focus-within:ring-cyan-500 transition-all bg-stone-50">
                    <div class="flex items-center justify-center w-9 h-9 rounded-full bg-amber-100 text-lg ml-1 shrink-0">✍️</div>
                    <input type="text" id="customLocationInput" placeholder="手动输入地名..." class="flex-1 bg-transparent outline-none text-sm text-stone-700 px-2 py-2 placeholder-stone-400 font-medium">
                    <button onclick="setCustomLocation()" class="bg-cyan-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-md shadow-cyan-600/20 hover:bg-cyan-500 active:scale-95 transition-all">确认</button>
                </div>
            </div> <!-- 🚨 核心修复：就是缺了这个控制间距的闭合 div -->

            <button onclick="clearLocation()" class="w-full mt-6 py-3 bg-stone-100 text-stone-500 rounded-xl font-bold hover:bg-stone-200 transition-colors text-sm">清除定位 / 无</button>
        </div>
    </div> <!-- 🚨 定位弹窗彻底闭合 -->


    <!-- ================= 2. 录音弹窗 (微信高质感版) ================= -->
    <div id="recordingModal" class="hidden fixed inset-0 z-[100] no-print">
        <div class="absolute inset-0 bg-stone-900/70 backdrop-blur-sm flex flex-col items-center justify-center">
            <div class="relative z-10 w-44 h-44 bg-black/60 backdrop-blur-xl rounded-3xl flex flex-col items-center justify-center shadow-2xl mb-16 border border-white/10">
                <div class="flex items-center gap-1.5 mb-5 h-10">
                    <div class="w-1.5 h-4 bg-cyan-400 rounded-full animate-[pulse_0.8s_ease-in-out_infinite]"></div>
                    <div class="w-1.5 h-8 bg-cyan-400 rounded-full animate-[pulse_1s_ease-in-out_infinite_0.2s]"></div>
                    <div class="w-1.5 h-10 bg-cyan-400 rounded-full animate-[pulse_0.9s_ease-in-out_infinite_0.4s]"></div>
                    <div class="w-1.5 h-7 bg-cyan-400 rounded-full animate-[pulse_1.1s_ease-in-out_infinite_0.1s]"></div>
                    <div class="w-1.5 h-5 bg-cyan-400 rounded-full animate-[pulse_0.85s_ease-in-out_infinite_0.3s]"></div>
                </div>
                <div id="recordTimeDisplay" class="text-3xl font-mono font-bold text-white tracking-widest mb-1 drop-shadow-md">00:00</div>
                <p class="text-[10px] text-white/50 tracking-widest font-medium mt-1">正在倾听...</p>
            </div>

            <div class="relative z-10 flex items-center justify-center gap-16">
                <button onclick="cancelRecording()" class="flex flex-col items-center gap-3 group outline-none">
                    <div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur text-white/80 flex items-center justify-center text-2xl shadow-sm border border-white/20 hover:bg-rose-500/30 hover:text-rose-400 hover:border-rose-500/50 transition-all active:scale-90">✕</div>
                    <span class="text-[11px] text-white/60 font-bold tracking-widest">取消</span>
                </button>
                <button onclick="stopRecording()" class="flex flex-col items-center gap-3 group outline-none">
                    <div class="w-16 h-16 rounded-full bg-cyan-500 text-white flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-cyan-400 active:scale-90 transition-all">
                        <svg class="w-7 h-7 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </div>
                    <span class="text-[11px] text-cyan-400 font-bold tracking-widest">完成</span>
                </button>
            </div>
        </div>
    </div>


    <!-- ================= 3. 高德地图点选弹窗 ================= -->
    <div id="mapPickerModal" class="hidden fixed inset-0 bg-white z-[80] flex flex-col no-print">
        <div class="p-4 flex justify-between items-center border-b border-stone-100 bg-white">
            <button onclick="closeMapPicker()" class="text-stone-500 font-bold px-2">取消</button>
            <span class="font-bold text-stone-800">在地图上挑选位置</span>
            <button id="confirmMapLoc" class="bg-cyan-600 text-white px-5 py-1.5 rounded-full text-sm font-bold shadow-md">确定</button>
        </div>
        <div id="mapContainer" class="flex-1 bg-stone-100"></div>
        <div class="p-5 bg-white border-t border-stone-100 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
            <div class="flex items-center gap-2">
                <span class="text-xl">📍</span>
                <div id="selectedAddrInfo" class="text-sm text-stone-600 font-medium">请在地图上点击选择地点...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'ab70a49e999d019d7996bea6f204f3f0', // 你的安全密钥
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=378f2db27ff0e5e9935886287f46eec3"></script>
    
<script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- 1. 核心基建 (必须最先加载) -->
    <script src="core/storage.js"></script>
    <script src="core/device.js"></script>
    
    <!-- 2. 独立业务模块 -->
    <script src="modules/map.js"></script>
    <script src="modules/roam.js"></script>
    <script src="modules/gallery.js"></script>
    <script src="modules/calendar.js"></script>
    
    <!-- 3. 主引擎 (最后启动) -->
    <script src="app.js"></script>
</body>
</html>
